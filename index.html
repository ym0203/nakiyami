<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Playlist Player</title>
</head>
<body>
  <h1>Music Player</h1>

  <audio id="player" controls></audio>

  <script>
    const playlist = [
      "music-box_1.mp3",
      "music-box_2.mp3",
      "music-box_3.mp3"
    ];

    let index = 0;
    const player = document.getElementById("player");

    function loadSong(i) {
      player.src = playlist[i];
      player.play();
    }

    // 次の曲へ
    player.addEventListener("ended", function() {
      index++;
      if (index < playlist.length) {
        loadSong(index);
      } else {
        index = 0; // ループさせたくないならこの行消す
      }
    });

    // 最初の曲
    loadSong(index);
  </script>
</body>
</html>
